name: Deploy Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # keep v4 (already latest stable)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20   # your app runtime (can stay 18/20/22)

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/pankh/SERVER
            git pull origin main
            npm install
            npm run build
            pm2 restart pankh-api || pm2 start dist/main.js --name pankh-api